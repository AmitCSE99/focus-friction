name: Publish to Chrome Web Store

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Package and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package extension into ZIP
        # List files explicitly so README, .github/, and any future
        # non-extension files are never accidentally bundled.
        run: |
          zip focus-friction.zip \
            manifest.json \
            background.js \
            content.js \
            popup.html \
            popup.js

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish to Chrome Web Store
        # --source  : path to the ZIP produced above
        # --auto-publish : submit immediately instead of leaving as a draft
        run: |
          npx chrome-webstore-upload-cli@latest upload \
            --source focus-friction.zip \
            --auto-publish
        env:
          EXTENSION_ID:  ${{ secrets.EXTENSION_ID }}
          CLIENT_ID:     ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
