<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Friction</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        color: #1a1a1a;
        background: #fff;
        width: 280px;
        padding: 16px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }

      header h1 {
        font-size: 16px;
        font-weight: 600;
        color: #111;
      }

      header .badge {
        font-size: 11px;
        background: #f0fdf4;
        color: #16a34a;
        border: 1px solid #bbf7d0;
        border-radius: 99px;
        padding: 1px 7px;
        font-weight: 500;
      }

      /* ---- Add form ---- */
      .add-row {
        display: flex;
        gap: 6px;
        margin-bottom: 14px;
      }

      .add-row input {
        flex: 1;
        padding: 7px 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s;
      }

      .add-row input:focus {
        border-color: #6366f1;
      }

      .add-row input::placeholder {
        color: #9ca3af;
      }

      .add-row button {
        padding: 7px 14px;
        background: #6366f1;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
      }

      .add-row button:hover {
        background: #4f46e5;
      }

      /* ---- Error message ---- */
      #error-msg {
        font-size: 12px;
        color: #dc2626;
        margin-bottom: 8px;
        min-height: 16px;
      }

      /* ---- Site list ---- */
      #site-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .empty-state {
        text-align: center;
        color: #9ca3af;
        padding: 20px 0;
        font-size: 13px;
      }

      .site-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        transition: background 0.1s;
      }

      .site-row:hover {
        background: #f3f4f6;
      }

      .site-name {
        font-size: 13px;
        color: #374151;
        word-break: break-all;
      }

      .remove-btn {
        flex-shrink: 0;
        margin-left: 8px;
        background: none;
        border: none;
        cursor: pointer;
        color: #9ca3af;
        font-size: 16px;
        line-height: 1;
        padding: 2px 4px;
        border-radius: 4px;
        transition: color 0.15s, background 0.15s;
      }

      .remove-btn:hover {
        color: #dc2626;
        background: #fee2e2;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Focus Friction</h1>
      <span class="badge">active</span>
    </header>

    <div class="add-row">
      <input
        id="new-site"
        type="text"
        placeholder="reddit.com"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="add-btn">Add</button>
    </div>
    <div id="error-msg"></div>

    <div id="site-list"></div>

    <script src="popup.js"></script>
  </body>
</html>
